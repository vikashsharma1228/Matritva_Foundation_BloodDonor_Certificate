name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          chanel: 'stable'

      - name: Install Dependencies
        # pubspec.yaml 'frontend' folder mein hai
        run: flutter pub get
        working-directory: frontend

      - name: Build Flutter Web
        # Build command 'frontend' folder se chalegi
        run: flutter build web --release
        working-directory: frontend

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Deployment ke liye ye path use hoga (bina kisi extra space ke)
          working-directory: ./frontend/build/web
          vercel-args: '--prod --yes --no-wait'
          github-comment: false